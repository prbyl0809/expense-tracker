spring:
  datasource:
    url: jdbc:h2:mem:expensetracker;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

app:
  cors:
    allowed-origins: http://localhost:5173
  seed:
    enabled: false
  jwt:
    secret: bm90LWEtcmVhbC1zZWNyZXQtdGVzdC1vbmx5LWRvLW5vdC11c2UtcHJvZA==
    expiration-ms: 86400000
